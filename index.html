<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2练枪神器 | 网页版定位训练</title>
    <meta name="description" content="为 CS2 玩家打造的免费网页练枪工具...">
<meta name="keywords" content="CS2练枪,瞄准训练,反应速度测试,网页FPS工具,3D射击训练">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 基础样式 - 保持当前风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a14;
            color: white;
        }

        #app {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主菜单容器 - 类似trainGun-main布局 */
        .menu-container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        /* Logo区域 */
        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .logo-line {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4facfe, transparent);
            margin: 0 auto;
        }

        /* 模式网格 - 类似trainGun-main的6卡片布局 */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .mode-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .mode-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 模式卡片 */
        .mode-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(79, 172, 254, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .mode-card:hover {
            transform: translateY(-5px);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.2);
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        .mode-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 15px;
        }

        .mode-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #4facfe;
        }

        .mode-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .mode-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: #4facfe;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 底部按钮 */
        .footer-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(79, 172, 254, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(79, 172, 254, 0.1);
            border-color: rgba(79, 172, 254, 0.5);
            transform: translateY(-2px);
        }

        .btn-icon {
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 主菜单视图 - 类似trainGun-main布局 -->
        <div class="menu-container">
            <!-- Logo区域 -->
            <div class="logo-container">
                <h1 class="logo">BALL AIM TRAINER</h1>
                <p class="subtitle">2D射击训练器 - 提升你的瞄准精度</p>
                <div class="logo-line"></div>
            </div>

            <!-- 模式网格 - 6个训练模式卡片 -->
            <div class="mode-grid" id="mode-grid">
                <!-- 模式1: 基础训练 -->
                <div class="mode-card" data-mode="basic">
                    <div class="card-content">
                        <span class="mode-icon">🎯</span>
                        <h3 class="mode-title">基础训练</h3>
                        <p class="mode-desc">固定目标点击训练，适合新手入门</p>
                        <span class="mode-tag">BASIC</span>
                    </div>
                </div>

                <!-- 模式2: 移动训练 -->
                <div class="mode-card" data-mode="moving">
                    <div class="card-content">
                        <span class="mode-icon">🏃</span>
                        <h3 class="mode-title">移动训练</h3>
                        <p class="mode-desc">移动目标追踪训练，提升动态瞄准</p>
                        <span class="mode-tag">MOVING</span>
                    </div>
                </div>

                <!-- 模式3: 连击训练 -->
                <div class="mode-card" data-mode="combo">
                    <div class="card-content">
                        <span class="mode-icon">💥</span>
                        <h3 class="mode-title">连击训练</h3>
                        <p class="mode-desc">连续命中目标，保持连击不断</p>
                        <span class="mode-tag">COMBO</span>
                    </div>
                </div>

                <!-- 模式4: 速度训练 -->
                <div class="mode-card" data-mode="speed">
                    <div class="card-content">
                        <span class="mode-icon">⚡</span>
                        <h3 class="mode-title">速度训练</h3>
                        <p class="mode-desc">快速反应训练，提升点击速度</p>
                        <span class="mode-tag">SPEED</span>
                    </div>
                </div>

                <!-- 模式5: 精度训练 -->
                <div class="mode-card" data-mode="precision">
                    <div class="card-content">
                        <span class="mode-icon">🎯</span>
                        <h3 class="mode-title">精度训练</h3>
                        <p class="mode-desc">小目标精准点击，提升射击精度</p>
                        <span class="mode-tag">PRECISION</span>
                    </div>
                </div>

                <!-- 模式6: 耐力训练 -->
                <div class="mode-card" data-mode="endurance">
                    <div class="card-content">
                        <span class="mode-icon">⏱️</span>
                        <h3 class="mode-title">耐力训练</h3>
                        <p class="mode-desc">长时间持续训练，提升耐力稳定性</p>
                        <span class="mode-tag">ENDURANCE</span>
                    </div>
                </div>
            </div>

            <!-- 底部按钮 -->
            <div class="footer-btns">
                <button class="btn" id="btn-settings">
                    <span class="btn-icon">⚙️</span>
                    <span>游戏设置</span>
                </button>
                <button class="btn" id="btn-stats">
                    <span class="btn-icon">📊</span>
                    <span>训练统计</span>
                </button>
                <button class="btn" id="btn-help">
                    <span class="btn-icon">❓</span>
                    <span>使用帮助</span>
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
