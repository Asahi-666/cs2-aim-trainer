<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Aim Trainer - 2D射击训练</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 基础样式 - 保持当前风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a14;
            color: white;
        }

        #app {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主菜单容器 - 类似trainGun-main布局 */
        .menu-container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        /* Logo区域 */
        .logo-container {
            margin-bottom: 40px;
        }

        .logo {
            font-size: 64px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 20px;
            color: #aaa;
            margin-bottom: 20px;
        }

        .logo-line {
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4facfe, transparent);
            margin: 0 auto;
        }

        /* 模式网格 - 类似trainGun-main的6卡片布局 */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 1024px) {
            .mode-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .mode-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 模式卡片 */
        .mode-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(79, 172, 254, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .mode-card:hover {
            transform: translateY(-5px);
            border-color: rgba(79, 172, 254, 0.5);
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.2);
        }

        .card-content {
            position: relative;
            z-index: 2;
        }

        .mode-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 15px;
        }

        .mode-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #4facfe;
        }

        .mode-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .mode-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(79, 172, 254, 0.1);
            border: 1px solid rgba(79, 172, 254, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: #4facfe;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* 底部按钮 */
        .footer-btns {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(79, 172, 254, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: rgba(79, 172, 254, 0.1);
            border-color: rgba(79, 172, 254, 0.5);
            transform: translateY(-2px);
        }

        .btn-icon {
            font-size: 18px;
        }
    </style>
</head>
